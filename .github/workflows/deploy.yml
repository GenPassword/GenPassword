name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'passwordGenerated/**'  # Отслеживаем изменения только в папке passwordGenerated

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: passwordGenerated/package-lock.json  # Путь правильный

      - name: Install dependencies
        run: npm ci
        working-directory: ./passwordGenerated  # Правильно

      - name: Build
        run: npm run build
        working-directory: ./passwordGenerated  # Правильно

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./passwordGenerated/dist  # Правильно
          publish_branch: gh-pages
          force_orphan: true  # Добавьте эту строку для чистой истории
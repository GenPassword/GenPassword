name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'passwordGenerated/**'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # ← УБРАЛИ defaults.run.working-directory
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: passwordGenerated/package-lock.json
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./passwordGenerated  # ← Указываем для каждой команды
      
      - name: Build
        run: npm run build
        working-directory: ./passwordGenerated  # ← Указываем для каждой команды
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./passwordGenerated/dist  # ← Теперь это ПРАВИЛЬНО!
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
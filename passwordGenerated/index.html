<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Генератор паролей</title>
    
    <!-- CSP Заголовки для защиты от XSS (исправленные) -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https:;
      connect-src 'self' https://myproject24.ru;
      base-uri 'self';
      form-action 'self';
    ">
    
    <!-- CSRF токен -->
    <meta name="csrf-token" content="">
    
    <!-- Подключение Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      /* Анимация для уведомлений */
      @keyframes fadeInOut {
        0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
        15% { opacity: 1; transform: translateX(-50%) translateY(0); }
        85% { opacity: 1; transform: translateX(-50%) translateY(0); }
        100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    
    <script>
      // Генерация CSRF токена
      function generateCSRFToken() {
        const token = Math.random().toString(36).substring(2) + Date.now().toString(36);
        const metaTag = document.querySelector('meta[name="csrf-token"]');
        if (metaTag) metaTag.setAttribute('content', token);
        sessionStorage.setItem('csrfToken', token);
        return token;
      }
      
      // Устанавливаем CSRF токен при загрузке
      if (!sessionStorage.getItem('csrfToken')) {
        generateCSRFToken();
      } else {
        const metaTag = document.querySelector('meta[name="csrf-token"]');
        if (metaTag) metaTag.setAttribute('content', sessionStorage.getItem('csrfToken'));
      }
      
      // Защита от манипуляций через консоль
      (function protectFromConsole() {
        const originalSetItem = localStorage.setItem;
        localStorage.setItem = function(key, value) {
          if (key === 'accessToken' || key === 'userPassword') {
            console.warn('Операция запрещена');
            throw new Error('Операция запрещена');
          }
          return originalSetItem.call(this, key, value);
        };
        
        window.eval = function() {
          console.warn('eval запрещён');
          throw new Error('eval запрещён');
        };
        
        const originalCreateElement = document.createElement;
        document.createElement = function(tagName) {
          if (tagName.toLowerCase() === 'script') {
            console.warn('Создание скриптов запрещено');
            throw new Error('Создание скриптов запрещено');
          }
          return originalCreateElement.call(document, tagName);
        };
      })();
    </script>
  </body>
</html>

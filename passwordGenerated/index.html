<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор паролей</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2em;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .password-display {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            position: relative;
        }

        .password-text {
            font-family: 'Courier New', monospace;
            font-size: 24px;
            color: #2c3e50;
            word-break: break-all;
            margin-bottom: 15px;
            padding-right: 50px;
        }

        .copy-btn-small {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .copy-btn-small:hover {
            opacity: 1;
        }

        .strength-badge {
            display: inline-block;
            background: #2ecc71;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .settings-section {
            margin-bottom: 30px;
        }

        .section-title {
            color: #2c3e50;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .slider-container {
            margin-bottom: 25px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #7f8c8d;
            font-size: 14px;
        }

        .slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3498db;
            cursor: pointer;
        }

        .slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3498db;
            cursor: pointer;
            border: none;
        }

        .checkbox-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #3498db;
        }

        .checkbox-item label {
            cursor: pointer;
            color: #34495e;
            font-size: 15px;
        }

        .additional-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #ecf0f1;
        }

        .additional-title {
            color: #2c3e50;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .generate-btn {
            width: 100%;
            padding: 16px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        .generate-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #e74c3c;
            background: #fdf2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        .loading {
            text-align: center;
            color: #7f8c8d;
            margin: 20px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Генератор паролей</h1>
        <p class="subtitle">Создайте надёжный пароль за секунду</p>
        
        <div class="password-display">
            <button class="copy-btn-small" id="copyBtn" title="Копировать">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </button>
            <div id="password" class="password-text">Gx7$kL!9mT2*</div>
            <div class="strength-badge" id="strengthBadge">Надежный</div>
        </div>

        <div class="settings-section">
            <h2 class="section-title">Настройки</h2>
            
            <div class="slider-container">
                <div class="slider-label">
                    <span>Длина пароля</span>
                    <span id="lengthValue">12</span>
                </div>
                <input type="range" id="length" class="slider" min="4" max="64" value="12">
            </div>

            <div class="checkbox-list">
                <div class="checkbox-item">
                    <input type="checkbox" id="includeLowercase" checked>
                    <label for="includeLowercase">Строчные (a-z)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="includeUppercase" checked>
                    <label for="includeUppercase">Прописные (A-Z)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="includeDigits" checked>
                    <label for="includeDigits">Цифры (0-9)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="includeSpecial" checked>
                    <label for="includeSpecial">Спецсимволы (!@#$%)</label>
                </div>
            </div>

            <div class="additional-section">
                <h3 class="additional-title">Дополнительно</h3>
                <div class="checkbox-list">
                    <div class="checkbox-item">
                        <input type="checkbox" id="excludeSimilar">
                        <label for="excludeSimilar">Исключить похожие символы (0Ol1I)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="noRepeats">
                        <label for="noRepeats">Запрет повторяющихся символов</label>
                    </div>
                </div>
            </div>
        </div>

        <button id="generateBtn" class="generate-btn">Сгенерировать пароль</button>

        <div id="loading" class="loading">
            ⏳ Генерация пароля...
        </div>

        <div id="error" class="error-message"></div>
    </div>

    <script>
        const API_URL = 'https://monitoring-thinks-rings-detail.trycloudflare.com/api/password/generate';

        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const lengthSlider = document.getElementById('length');
        const lengthValue = document.getElementById('lengthValue');
        const passwordEl = document.getElementById('password');
        const strengthBadge = document.getElementById('strengthBadge');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');

        // Обновление значения длины
        lengthSlider.addEventListener('input', function() {
            lengthValue.textContent = this.value;
        });

        function getRequestData() {
            return {
                length: parseInt(lengthSlider.value) || 12,
                includeLowercase: document.getElementById('includeLowercase').checked,
                includeUppercase: document.getElementById('includeUppercase').checked,
                includeDigits: document.getElementById('includeDigits').checked,
                includeSpecial: document.getElementById('includeSpecial').checked,
                excludeSimilar: document.getElementById('excludeSimilar').checked,
                noRepeats: document.getElementById('noRepeats').checked,
                minDigits: 0,
                minSpecial: 0
            };
        }

        function getStrengthLevel(entropy) {
            if (entropy < 28) return { text: 'Слабый', color: '#e74c3c' };
            if (entropy < 36) return { text: 'Средний', color: '#f39c12' };
            if (entropy < 60) return { text: 'Надежный', color: '#2ecc71' };
            return { text: 'Очень надежный', color: '#27ae60' };
        }

        async function copyPassword() {
            const password = passwordEl.textContent;
            if (!password) return;

            try {
                await navigator.clipboard.writeText(password);
                const originalHTML = copyBtn.innerHTML;
                copyBtn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2ecc71" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                setTimeout(() => {
                    copyBtn.innerHTML = originalHTML;
                }, 2000);
            } catch (err) {
                console.error('Ошибка копирования:', err);
            }
        }

        async function generatePassword() {
            errorDiv.style.display = 'none';
            loadingDiv.style.display = 'block';
            generateBtn.disabled = true;

            try {
                const requestData = getRequestData();

                if (!requestData.includeLowercase && !requestData.includeUppercase && 
                    !requestData.includeDigits && !requestData.includeSpecial) {
                    throw new Error('Выберите хотя бы один тип символов');
                }

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    throw new Error(`Ошибка HTTP: ${response.status}`);
                }

                const data = await response.json();

                passwordEl.textContent = data.password || 'Ошибка генерации';
                
                const strength = getStrengthLevel(data.entropy || 0);
                strengthBadge.textContent = strength.text;
                strengthBadge.style.background = strength.color;

            } catch (error) {
                console.error('Ошибка:', error);
                errorDiv.textContent = `Ошибка: ${error.message}`;
                errorDiv.style.display = 'block';
            } finally {
                loadingDiv.style.display = 'none';
                generateBtn.disabled = false;
            }
        }

        generateBtn.addEventListener('click', generatePassword);
        copyBtn.addEventListener('click', copyPassword);

        // Генерируем пароль при загрузке
        window.addEventListener('load', generatePassword);
    </script>
</body>
</html>
